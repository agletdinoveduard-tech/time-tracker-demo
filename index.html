<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Учёт времени сотрудников</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 8px 0; color: #1a1a1a; }
        h3 { font-size: 18px; font-weight: 600; margin: 0 0 12px 0; color: #333; }
        label { font-weight: 500; font-size: 14px; color: #333; display: block; margin-bottom: 6px; }
        select, input, button {
            width: 100%;
            padding: 14px 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 14px;
            background: white;
            margin-bottom: 16px;
            font-family: inherit;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { background: #005fc1; transform: scale(0.98); }
        .btn-delete { background: #ff3b30; }
        .btn-edit { background: #ff9500; }
        .btn-export { background: #34c759; }
        .calc-button { background: #34c759; margin-top: 8px; }
        .result-block {
            background: #eef2ff;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .result-value { font-size: 28px; font-weight: 700; color: #1a1a1a; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #f8f8f8; font-weight: 600; }
        .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-row select, .filter-row input { flex: 1; margin-bottom: 0; }
        .list-filters {
            background: #f8f8f8;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .list-filters h4 { margin: 0 0 10px 0; font-size: 14px; color: #666; }
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 14px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }
        .autocomplete-suggestions div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-suggestions div:hover { background: #f0f0f0; }
        .expand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .expand-header h3 { margin: 0; }
        .expand-icon { font-size: 20px; color: #007aff; }
        .warning { color: #ff3b30; font-size: 12px; margin-top: -12px; margin-bottom: 12px; display: none; }
        .sort-row { display: flex; justify-content: flex-end; margin-bottom: 12px; }
        .sort-select { width: auto; padding: 8px 12px; font-size: 14px; margin-bottom: 0; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }
        .modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .modal-buttons button { margin-bottom: 0; }
        .import-file { display: none; }
        .action-buttons { display: flex; gap: 8px; }
        .action-buttons button { padding: 6px 12px; font-size: 12px; margin-bottom: 0; width: auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📊 Учёт времени сотрудников</h1>
        <h3>🔍 Отчёт</h3>
        <label>📅 Дата начала</label>
        <input type="date" id="startDate">
        <label>📅 Дата конца</label>
        <input type="date" id="endDate">
        <label>👤 Сотрудник</label>
        <select id="employeeFilter"><option value="">Все сотрудники</option></select>
        <button id="calculateBtn" class="calc-button">📊 РАССЧИТАТЬ</button>

        <div class="result-block">
            <div>💰 Итого выплат:</div>
            <div class="result-value" id="totalPayment">0 ₽</div>
            <div style="margin-top: 12px;">⏱ Итого часов:</div>
            <div class="result-value" id="totalHours">0</div>
            <div style="margin-top: 12px; font-size: 12px; color: #666;">📊 Количество записей: <span id="recordsCount">0</span></div>
        </div>
    </div>

    <div class="card add-form">
        <h3>✏️ Добавить запись</h3>
        <label>📅 Дата</label>
        <input type="date" id="newDate">
        <label>👤 ФИО сотрудника</label>
        <div class="autocomplete-container">
            <input type="text" id="newEmployee" placeholder="Иванов Иван" autocomplete="off">
            <div id="autocompleteList" class="autocomplete-suggestions"></div>
        </div>
        <label>⏱ Часы</label>
        <input type="number" id="newHours" step="1" placeholder="8">
        <div id="duplicateWarning" class="warning">⚠️ Сотрудник уже добавлен на эту дату!</div>
        <button id="addBtn">➕ Добавить</button>
    </div>

    <div class="card">
        <div class="expand-header" id="expandHeader">
            <h3>📋 Список записей</h3>
            <span class="expand-icon" id="expandIcon">▲</span>
        </div>
        <div id="recordsContent">
            <div class="list-filters">
                <h4>🎯 Фильтры для списка</h4>
                <div class="filter-row">
                    <select id="yearListFilter"><option value="">Все годы</option></select>
                    <select id="monthListFilter">
                        <option value="">Все месяцы</option>
                        <option value="1">Январь</option><option value="2">Февраль</option><option value="3">Март</option>
                        <option value="4">Апрель</option><option value="5">Май</option><option value="6">Июнь</option>
                        <option value="7">Июль</option><option value="8">Август</option><option value="9">Сентябрь</option>
                        <option value="10">Октябрь</option><option value="11">Ноябрь</option><option value="12">Декабрь</option>
                    </select>
                </div>
                <div class="filter-row">
                    <select id="employeeListFilter"><option value="">Все сотрудники</option></select>
                </div>
                <div class="sort-row">
                    <select id="sortOrder" class="sort-select">
                        <option value="desc">📅 Сначала новые</option>
                        <option value="asc">📅 Сначала старые</option>
                    </select>
                </div>
                <button id="applyListFilterBtn" style="margin-bottom: 8px;">📋 Применить к списку</button>
                <div class="filter-row" style="margin-top: 8px;">
                    <button id="syncBtn" class="btn-export">☁️ Синхронизировать</button>
                    <button id="exportBtn" class="btn-export">💾 Экспорт</button>
                    <button id="importBtn" style="background:#ff9500;">📂 Импорт</button>
                </div>
                <div id="syncStatus" style="font-size:12px; color:#666; text-align:center; margin-top:8px;"></div>
            </div>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead><tr><th class="sort-header" data-sort="date">Дата <span class="sort-icon">▼</span></th><th>Сотрудник</th><th>Часы</th><th>Сумма</th><th style="width:80px;">Действия</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<input type="file" id="importFile" class="import-file" accept=".json">

<!-- Модальное окно редактирования -->
<div id="editModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>✏️ Редактировать запись</h3>
        <label>📅 Дата</label>
        <input type="date" id="editDate">
        <label>👤 ФИО сотрудника</label>
        <div class="autocomplete-container">
            <input type="text" id="editEmployee" autocomplete="off">
            <div id="editAutocompleteList" class="autocomplete-suggestions"></div>
        </div>
        <label>⏱ Часы</label>
        <input type="number" id="editHours" step="1">
        <div id="editDuplicateWarning" class="warning">⚠️ Сотрудник уже добавлен на эту дату!</div>
        <div class="modal-buttons">
            <button id="saveEditBtn">💾 Сохранить</button>
            <button id="cancelEditBtn" style="background:#8e8e93;">❌ Отмена</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ ⚠️ ⚠️ ЗАМЕНИТЕ ЭТУ СТРОКУ НА ВАШ АКТУАЛЬНЫЙ URL ИЗ APPS SCRIPT ⚠️ ⚠️ ⚠️
    const API_URL ='https://script.google.com/macros/s/AKfycbwu3Vqvp52lCAot2Z37cTNwakpc8Xh31Xc88QpGNIp8GtBMI0XzsbLuzJcP0StNYRLXOw/exec'

    let records = [], editingId = null, isExpanded = true, syncInProgress = false;
    let currentFilter = { startDate: '', endDate: '', employee: '' };
    let listFilter = { year: '', month: '', employee: '', sortOrder: 'desc' };

    // ---------- helpers ----------
    const formatDate = (d) => { if (!d) return ''; const p = d.split('-'); return `${p[2]}.${p[1]}.${p[0]}`; };
    const calcPayment = (h) => (h === 11 ? h * 372.7 : h * 400);
    const generateId = () => Date.now();

    function loadData() {
        const saved = localStorage.getItem('workRecords');
        records = saved ? JSON.parse(saved) : [];
        saveData();
    }
    function saveData() { localStorage.setItem('workRecords', JSON.stringify(records)); }
    const uniqueEmployees = () => [...new Set(records.map(r => r.employee))].sort();
    const uniqueYears = () => [...new Set(records.map(r => parseInt(r.date.split('-')[0]))).values()].filter(y => !isNaN(y)).sort((a,b)=>b-a);
    const isDuplicate = (date, emp, excludeId = null) => records.some(r => r.date === date && r.employee === emp && (excludeId === null || r.id !== excludeId));

    // фильтрация
    function filterForReport() {
        let f = [...records];
        if (currentFilter.startDate) f = f.filter(r => r.date >= currentFilter.startDate);
        if (currentFilter.endDate) f = f.filter(r => r.date <= currentFilter.endDate);
        if (currentFilter.employee) f = f.filter(r => r.employee === currentFilter.employee);
        return f;
    }
    function filterForList() {
        let f = [...records];
        if (listFilter.year) f = f.filter(r => r.date.startsWith(listFilter.year));
        if (listFilter.month) { const m = listFilter.month.padStart(2,'0'); f = f.filter(r => r.date.split('-')[1] === m); }
        if (listFilter.employee) f = f.filter(r => r.employee === listFilter.employee);
        f.sort((a,b) => listFilter.sortOrder === 'desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date));
        return f;
    }

    // рендер
    function renderReport() {
        const f = filterForReport();
        let th=0, tp=0;
        f.forEach(r => { th+=r.hours; tp+=r.payment; });
        document.getElementById('totalHours').innerText = th;
        document.getElementById('totalPayment').innerText = tp.toLocaleString('ru-RU', {minimumFractionDigits:2}) + ' ₽';
        document.getElementById('recordsCount').innerText = f.length;
    }
    function renderTable() {
        const f = filterForList();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        f.forEach(rec => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = formatDate(rec.date);
            row.insertCell(1).innerText = rec.employee;
            row.insertCell(2).innerText = rec.hours;
            row.insertCell(3).innerText = rec.payment.toLocaleString('ru-RU',{minimumFractionDigits:2}) + ' ₽';
            const act = row.insertCell(4);
            act.className = 'action-buttons';
            const eBtn = document.createElement('button'); eBtn.innerText = '✏️'; eBtn.className = 'btn-edit'; eBtn.onclick = () => openEdit(rec.id);
            const dBtn = document.createElement('button'); dBtn.innerText = '🗑️'; dBtn.className = 'btn-delete'; dBtn.onclick = () => deleteRec(rec.id);
            act.append(eBtn, dBtn);
        });
        const icon = document.querySelector('.sort-icon');
        if(icon) icon.innerText = listFilter.sortOrder === 'desc' ? '▼' : '▲';
    }
    function updateAll() { renderReport(); renderTable(); }

    // выпадающие списки
    function updateFilters() {
        const ySel = document.getElementById('yearListFilter');
        const oldY = ySel.value;
        ySel.innerHTML = '<option value="">Все годы</option>';
        uniqueYears().forEach(y => { const opt = document.createElement('option'); opt.value = y; opt.textContent = y; ySel.appendChild(opt); });
        if (oldY && uniqueYears().includes(parseInt(oldY))) ySel.value = oldY;

        const empList = uniqueEmployees();
        ['employeeFilter', 'employeeListFilter'].forEach(id => {
            const sel = document.getElementById(id);
            const old = sel.value;
            sel.innerHTML = '<option value="">Все сотрудники</option>';
            empList.forEach(e => { const opt = document.createElement('option'); opt.value = e; opt.textContent = e; sel.appendChild(opt); });
            if (old && empList.includes(old)) sel.value = old;
        });
    }

    // авто-комплит
    function setupAutocomplete(inpId, listId, warnId, dateId) {
        const inp = document.getElementById(inpId), list = document.getElementById(listId);
        if(!inp || !list) return;
        inp.addEventListener('input', ()=>{
            const val = inp.value.toLowerCase();
            const filtered = uniqueEmployees().filter(e => e.toLowerCase().includes(val));
            if(filtered.length && val){
                list.innerHTML = filtered.map(n => `<div>${n}</div>`).join('');
                list.style.display = 'block';
                list.querySelectorAll('div').forEach(div => div.addEventListener('click', ()=>{
                    inp.value = div.innerText;
                    list.style.display = 'none';
                    if(warnId && dateId){
                        const date = document.getElementById(dateId).value;
                        const w = document.getElementById(warnId);
                        if(date && div.innerText && isDuplicate(date, div.innerText)) w.style.display = 'block';
                        else if(w) w.style.display = 'none';
                    }
                }));
            } else list.style.display = 'none';
        });
        inp.addEventListener('blur', ()=> setTimeout(()=>list.style.display='none',200));
        if(dateId && warnId){
            document.getElementById(dateId).addEventListener('change', ()=>{
                const date = document.getElementById(dateId).value;
                const emp = inp.value;
                const w = document.getElementById(warnId);
                if(date && emp && isDuplicate(date,emp)) w.style.display = 'block';
                else if(w) w.style.display = 'none';
            });
        }
    }

    // CRUD
    function addRecord(date, emp, h){
        if(!date || !emp || !h){ alert('Заполните все поля'); return false; }
        if(isDuplicate(date,emp)){ alert('❌ Сотрудник уже добавлен на эту дату'); return false; }
        h = parseFloat(h);
        if(isNaN(h) || h<=0){ alert('Некорректные часы'); return false; }
        const newRec = { id: generateId(), date, employee: emp.trim(), hours: h, payment: calcPayment(h) };
        records.push(newRec);
        saveData();
        updateFilters();
        updateAll();
        return true;
    }
    function deleteRec(id){
        if(confirm('Удалить запись?')){
            records = records.filter(r => r.id !== id);
            saveData();
            updateFilters();
            updateAll();
        }
    }
    function openEdit(id){
        editingId = id;
        const r = records.find(r => r.id === id);
        if(r){
            document.getElementById('editDate').value = r.date;
            document.getElementById('editEmployee').value = r.employee;
            document.getElementById('editHours').value = r.hours;
            document.getElementById('editModal').style.display = 'flex';
            setupAutocomplete('editEmployee','editAutocompleteList','editDuplicateWarning','editDate');
        }
    }
    function closeEdit(){ editingId = null; document.getElementById('editModal').style.display = 'none'; }
    function saveEdit(){
        const date = document.getElementById('editDate').value;
        const employee = document.getElementById('editEmployee').value;
        let hours = parseFloat(document.getElementById('editHours').value);
        if(!date || !employee || isNaN(hours) || hours<=0){ alert('Заполните поля'); return; }
        if(isDuplicate(date,employee,editingId)){ alert('❌ Дубликат'); return; }
        const idx = records.findIndex(r => r.id === editingId);
        if(idx !== -1){
            records[idx] = {...records[idx], date, employee: employee.trim(), hours, payment: calcPayment(hours)};
            saveData();
            updateFilters();
            updateAll();
        }
        closeEdit();
    }

    // Экспорт / импорт
    function exportData(){
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(records,null,2)], {type:'application/json'}));
        a.download = `backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert('✅ Экспорт выполнен');
    }
    function importData(){ document.getElementById('importFile').click(); }
    function handleImport(e){
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try{
                const imp = JSON.parse(ev.target.result);
                if(Array.isArray(imp)){ records = imp; saveData(); updateFilters(); updateAll(); alert('✅ Импорт выполнен'); }
                else alert('❌ Неверный формат');
            }catch(err){ alert('❌ Ошибка импорта'); }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    // ☁️ Синхронизация с Google Sheets (только GET)
    async function syncWithCloud(){
        if(syncInProgress) return;
        syncInProgress = true;
        const btn = document.getElementById('syncBtn'), statusDiv = document.getElementById('syncStatus');
        btn.classList.add('syncing');
        statusDiv.innerText = '🔄 Синхронизация...';
        try{
            // 1. Загружаем данные из облака (GET)
            const resp = await fetch(`${API_URL}?action=get`);
            const json = await resp.json();
            if(json.success && json.records){
                const cloudMap = new Map();
                json.records.forEach(r => cloudMap.set(r.id, r));
                records.forEach(r => cloudMap.set(r.id, r));
                records = Array.from(cloudMap.values());
                saveData();
                // 2. Отправляем локальные записи в облако (добавляем отсутствующие)
                for(const rec of records){
                    if(!json.records.find(cr => cr.id == rec.id)){
                        await fetch(`${API_URL}?action=add&id=${rec.id}&date=${encodeURIComponent(rec.date)}&employee=${encodeURIComponent(rec.employee)}&hours=${rec.hours}`);
                    }
                }
                updateFilters();
                updateAll();
                statusDiv.innerText = `✅ Синхронизировано ${new Date().toLocaleTimeString()}`;
            } else {
                statusDiv.innerText = '❌ Ошибка получения данных';
            }
        } catch(err){
            console.error(err);
            statusDiv.innerText = '❌ Ошибка синхронизации';
        } finally {
            syncInProgress = false;
            btn.classList.remove('syncing');
        }
    }

    // обработчики фильтров / интерфейса
    function applyReportFilters(){
        currentFilter.startDate = document.getElementById('startDate').value;
        currentFilter.endDate = document.getElementById('endDate').value;
        currentFilter.employee = document.getElementById('employeeFilter').value;
        renderReport();
    }
    function applyListFilters(){
        listFilter.year = document.getElementById('yearListFilter').value;
        listFilter.month = document.getElementById('monthListFilter').value;
        listFilter.employee = document.getElementById('employeeListFilter').value;
        listFilter.sortOrder = document.getElementById('sortOrder').value;
        renderTable();
    }
    function toggleSort(){
        const sel = document.getElementById('sortOrder');
        listFilter.sortOrder = listFilter.sortOrder === 'desc' ? 'asc' : 'desc';
        sel.value = listFilter.sortOrder;
        renderTable();
    }
    function toggleExpand(){
        const cont = document.getElementById('recordsContent'), icon = document.getElementById('expandIcon');
        if(isExpanded){ cont.style.display = 'none'; icon.innerText = '▼'; }
        else{ cont.style.display = 'block'; icon.innerText = '▲'; }
        isExpanded = !isExpanded;
    }

    // инициализация
    function init(){
        loadData();
        updateFilters();
        updateAll();
        setupAutocomplete('newEmployee','autocompleteList','duplicateWarning','newDate');
        setupAutocomplete('editEmployee','editAutocompleteList','editDuplicateWarning','editDate');

        document.getElementById('calculateBtn').addEventListener('click', applyReportFilters);
        document.getElementById('applyListFilterBtn').addEventListener('click', applyListFilters);
        document.getElementById('sortOrder').addEventListener('change', applyListFilters);
        document.getElementById('syncBtn').addEventListener('click', syncWithCloud);
        document.getElementById('exportBtn').addEventListener('click', exportData);
        document.getElementById('importBtn').addEventListener('click', importData);
        document.getElementById('importFile').addEventListener('change', handleImport);
        document.getElementById('addBtn').addEventListener('click', ()=>{
            const date = document.getElementById('newDate').value;
            const employee = document.getElementById('newEmployee').value;
            const hours = document.getElementById('newHours').value;
            if(addRecord(date,employee,hours)){
                document.getElementById('newDate').value = '';
                document.getElementById('newEmployee').value = '';
                document.getElementById('newHours').value = '';
                document.getElementById('duplicateWarning').style.display = 'none';
                updateAll();
            }
        });
        document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
        document.getElementById('cancelEditBtn').addEventListener('click', closeEdit);
        document.getElementById('expandHeader').addEventListener('click', toggleExpand);
        document.querySelector('.sort-header')?.addEventListener('click', toggleSort);
        document.getElementById('editModal').addEventListener('click', (e) => { if(e.target === document.getElementById('editModal')) closeEdit(); });

        applyReportFilters();
        applyListFilters();
    }
    init();
</script>
</body>
</html>
