<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Основная иконка для iPhone (добавление на экран "Домой") -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- Иконки для разных устройств Apple -->
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon.png">

<!-- Иконки для браузера (вкладка) -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon"type="image/png" sizes="16x16" href="favicon-16x16.png">

<!-- Иконки для Android/Chrome -->
<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

<!-- Название приложения (будет под иконкой) -->
<meta name="apple-mobile-web-app-title" content="Учёт времени">
<meta name="application-name" content="Учёт времени">

<!-- Цвет фона при загрузке -->
<meta name="theme-color" content="#34c759">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Режим приложения (без адресной строки) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Учёт времени сотрудников</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 8px; }
        h3 { font-size: 18px; font-weight: 600; margin: 0 0 12px; }
        label { font-weight: 500; font-size: 14px; display: block; margin-bottom: 6px; }
        select, input, button {
            width: 100%;
            padding: 14px 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { background: #005fc1; transform: scale(0.98); }
        .btn-delete { background: #ff3b30; }
        .btn-edit { background: #ff9500; }
        .calc-button { background: #34c759; }
        .export-button { background: #34c759; }
        .import-button { background: #007aff; }
        .result-block {
            background: #eef2ff;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin-top: 16px;
        }
        .result-value { font-size: 28px; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f8f8; font-weight: 600; }
        .add-form { background: #fff8e7; border: 1px solid #ffe5b4; }
        .action-buttons { display: flex; gap: 8px; }
        .action-buttons button { padding: 6px 12px; font-size: 12px; margin-bottom: 0; width: auto; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }
        .modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .modal-buttons button { margin-bottom: 0; }
        .filter-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-row select, .filter-row input, .filter-row button { flex: 1; margin-bottom: 0; }
        .list-filters {
            background: #f8f8f8;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .list-filters h4 { margin: 0 0 10px; font-size: 14px; color: #666; }
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 14px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }
        .autocomplete-suggestions div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-suggestions div:hover { background: #f0f0f0; }
        .expand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .expand-header h3 { margin: 0; }
        .expand-icon { font-size: 20px; }
        .warning { color: #ff3b30; font-size: 12px; margin-top: -12px; margin-bottom: 12px; display: none; }
        .sort-row { display: flex; justify-content: flex-end; margin-bottom: 12px; }
        .sort-select { width: auto; padding: 8px 12px; font-size: 14px; margin-bottom: 0; }
        .import-file { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📊 Учёт времени сотрудников</h1>
        <h3>🔍 Отчёт</h3>
        <label>📅 Дата начала</label>
        <input type="date" id="startDate">
        <label>📅 Дата конца</label>
        <input type="date" id="endDate">
        <label>👤 Сотрудник</label>
        <select id="employeeFilter"><option value="">Все сотрудники</option></select>

        <div class="filter-row">
            <button id="calculateBtn" class="calc-button">📊 РАССЧИТАТЬ</button>
            <button id="exportBtn" class="export-button">💾 ЭКСПОРТ</button>
            <button id="importBtn" class="import-button">📂 ИМПОРТ</button>
        </div>
        <input type="file" id="importFile" class="import-file" accept=".json">

        <div class="result-block">
            <div>💰 Итого выплат:</div>
            <div class="result-value" id="totalPayment">0 ₽</div>
            <div style="margin-top: 12px;">⏱ Итого часов:</div>
            <div class="result-value" id="totalHours">0</div>
            <div style="margin-top: 12px; font-size: 12px;">📊 Количество записей: <span id="recordsCount">0</span></div>
        </div>
    </div>

    <div class="card add-form">
        <h3>✏️ Добавить запись</h3>
        <label>📅 Дата</label>
        <input type="date" id="newDate">
        <label>👤 ФИО сотрудника</label>
        <div class="autocomplete-container">
            <input type="text" id="newEmployee" placeholder="Иванов Иван" autocomplete="off">
            <div id="autocompleteList" class="autocomplete-suggestions"></div>
        </div>
        <label>⏱ Часы</label>
        <input type="number" id="newHours" step="1" placeholder="8">
        <div id="duplicateWarning" class="warning">⚠️ Сотрудник уже добавлен на эту дату!</div>
        <button id="addBtn">➕ Добавить</button>
    </div>

    <div class="card">
        <div class="expand-header" id="expandHeader">
            <h3>📋 Список записей</h3>
            <span class="expand-icon" id="expandIcon">▲</span>
        </div>
        <div id="recordsContent">
            <div class="list-filters">
                <h4>🎯 Фильтры для списка</h4>
                <div class="filter-row">
                    <select id="yearListFilter"><option value="">Все годы</option></select>
                    <select id="monthListFilter">
                        <option value="">Все месяцы</option>
                        <option value="1">Январь</option><option value="2">Февраль</option><option value="3">Март</option>
                        <option value="4">Апрель</option><option value="5">Май</option><option value="6">Июнь</option>
                        <option value="7">Июль</option><option value="8">Август</option><option value="9">Сентябрь</option>
                        <option value="10">Октябрь</option><option value="11">Ноябрь</option><option value="12">Декабрь</option>
                    </select>
                </div>
                <div class="filter-row">
                    <select id="employeeListFilter"><option value="">Все сотрудники</option></select>
                </div>
                <div class="sort-row">
                    <select id="sortOrder" class="sort-select">
                        <option value="desc">📅 Сначала новые</option>
                        <option value="asc">📅 Сначала старые</option>
                    </select>
                </div>
                <button id="applyListFilterBtn">📋 Применить к списку</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="dataTable">
                    <thead><tr><th class="sort-header">Дата ▼</th><th>Сотрудник</th><th>Часы</th><th>Сумма</th><th>Действия</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>✏️ Редактировать запись</h3>
        <label>📅 Дата</label>
        <input type="date" id="editDate">
        <label>👤 ФИО сотрудника</label>
        <div class="autocomplete-container"><input type="text" id="editEmployee" autocomplete="off"><div id="editAutocompleteList" class="autocomplete-suggestions"></div></div>
        <label>⏱ Часы</label>
        <input type="number" id="editHours" step="1">
        <div id="editDuplicateWarning" class="warning">⚠️ Сотрудник уже добавлен на эту дату!</div>
        <div class="modal-buttons"><button id="saveEditBtn">💾 Сохранить</button><button id="cancelEditBtn">❌ Отмена</button></div>
    </div>
</div>

<script>
    // ============================================================
    // БАЗА ДАННЫХ (локальное хранилище)
    // ============================================================
    let records = [];
    let editingId = null;
    let isExpanded = true;
    
    let currentFilter = { startDate: '', endDate: '', employee: '' };
    let listFilter = { year: '', month: '', employee: '', sortOrder: 'desc' };

    // ============================================================
    // ФУНКЦИИ ДЛЯ РАБОТЫ С ДАТАМИ
    // ============================================================
    
    function normalizeDate(dateValue) {
        if (!dateValue) return '';
        if (typeof dateValue === 'string' && dateValue.match(/^\d{4}-\d{2}-\d{2}$/)) {
            return dateValue;
        }
        if (typeof dateValue === 'string' && dateValue.match(/^\d{2}\.\d{2}\.\d{4}$/)) {
            const parts = dateValue.split('.');
            return `${parts[2]}-${parts[1]}-${parts[0]}`;
        }
        const d = new Date(dateValue);
        if (!isNaN(d.getTime())) {
            const year = d.getUTCFullYear();
            const month = String(d.getUTCMonth() + 1).padStart(2, '0');
            const day = String(d.getUTCDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        return String(dateValue);
    }
    
    function formatDateForDisplay(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return `${parts[2]}.${parts[1]}.${parts[0]}`;
        }
        return dateStr;
    }

    const calcPayment = (h) => (h === 11 ? h * 372.7 : h * 400);
    const generateId = () => Date.now();
    const saveData = () => localStorage.setItem('workRecords', JSON.stringify(records));
    const loadData = () => { 
        const saved = localStorage.getItem('workRecords'); 
        records = saved ? JSON.parse(saved) : []; 
        saveData(); 
    };
    const uniqueEmployees = () => [...new Set(records.map(r => r.employee))].sort();
    const uniqueYears = () => [...new Set(records.map(r => r.date.split('-')[0]))].filter(y => y).sort((a,b)=>b-a);
    const isDuplicate = (date, emp, excludeId) => records.some(r => r.date === date && r.employee === emp && r.id !== excludeId);

    // ============================================================
    // ФИЛЬТРАЦИЯ
    // ============================================================
    function filterForReport() {
        let f = [...records];
        if (currentFilter.startDate) f = f.filter(r => r.date >= currentFilter.startDate);
        if (currentFilter.endDate) f = f.filter(r => r.date <= currentFilter.endDate);
        if (currentFilter.employee) f = f.filter(r => r.employee === currentFilter.employee);
        return f;
    }
    function filterForList() {
        let f = [...records];
        if (listFilter.year) f = f.filter(r => r.date.startsWith(listFilter.year));
        if (listFilter.month) { const m = listFilter.month.padStart(2,'0'); f = f.filter(r => r.date.split('-')[1] === m); }
        if (listFilter.employee) f = f.filter(r => r.employee === listFilter.employee);
        f.sort((a,b) => listFilter.sortOrder === 'desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date));
        return f;
    }

    // ============================================================
    // ОТОБРАЖЕНИЕ
    // ============================================================
    function renderReport() {
        const f = filterForReport();
        let h=0, p=0;
        f.forEach(r => { h += r.hours; p += r.payment; });
        document.getElementById('totalHours').innerText = h;
        document.getElementById('totalPayment').innerText = p.toLocaleString('ru-RU', {minimumFractionDigits:2}) + ' ₽';
        document.getElementById('recordsCount').innerText = f.length;
    }
    function renderTable() {
        const f = filterForList();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        f.forEach(rec => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = formatDateForDisplay(rec.date);
            row.insertCell(1).innerText = rec.employee;
            row.insertCell(2).innerText = rec.hours;
            row.insertCell(3).innerText = rec.payment.toLocaleString('ru-RU',{minimumFractionDigits:2}) + ' ₽';
            const act = row.insertCell(4);
            act.className = 'action-buttons';
            const eBtn = document.createElement('button'); eBtn.innerText = '✏️'; eBtn.className = 'btn-edit'; eBtn.onclick = () => openEdit(rec.id);
            const dBtn = document.createElement('button'); dBtn.innerText = '🗑️'; dBtn.className = 'btn-delete'; dBtn.onclick = () => deleteRec(rec.id);
            act.append(eBtn, dBtn);
        });
    }
    function updateAll() { renderReport(); renderTable(); }

    // ============================================================
    // ВЫПАДАЮЩИЕ СПИСКИ
    // ============================================================
    function updateFilters() {
        const ySel = document.getElementById('yearListFilter');
        const oldY = ySel.value;
        ySel.innerHTML = '<option value="">Все годы</option>';
        uniqueYears().forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; ySel.appendChild(o); });
        if (oldY && uniqueYears().includes(oldY)) ySel.value = oldY;

        const empList = uniqueEmployees();
        ['employeeFilter', 'employeeListFilter'].forEach(id => {
            const sel = document.getElementById(id);
            const old = sel.value;
            sel.innerHTML = '<option value="">Все сотрудники</option>';
            empList.forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; sel.appendChild(o); });
            if (old && empList.includes(old)) sel.value = old;
        });
    }

    // ============================================================
    // АВТОЗАПОЛНЕНИЕ
    // ============================================================
    function setupAutocomplete(inpId, listId, warnId, dateId) {
        const inp = document.getElementById(inpId), list = document.getElementById(listId);
        inp.addEventListener('input', () => {
            const val = inp.value.toLowerCase();
            const filtered = uniqueEmployees().filter(e => e.toLowerCase().includes(val));
            list.innerHTML = filtered.map(n => `<div>${n}</div>`).join('');
            list.style.display = filtered.length && val ? 'block' : 'none';
            list.querySelectorAll('div').forEach(div => div.addEventListener('click', () => {
                inp.value = div.innerText;
                list.style.display = 'none';
                if (warnId && dateId) {
                    const d = document.getElementById(dateId).value;
                    const w = document.getElementById(warnId);
                    if (d && div.innerText && isDuplicate(d, div.innerText, null)) w.style.display = 'block';
                    else if (w) w.style.display = 'none';
                }
            }));
        });
        inp.addEventListener('blur', () => setTimeout(() => list.style.display = 'none', 200));
        if (dateId && warnId) {
            document.getElementById(dateId).addEventListener('change', () => {
                const d = document.getElementById(dateId).value;
                const e = inp.value;
                const w = document.getElementById(warnId);
                if (d && e && isDuplicate(d, e, null)) w.style.display = 'block';
                else if (w) w.style.display = 'none';
            });
        }
    }

    // ============================================================
    // CRUD
    // ============================================================
    function addRecord(date, emp, h) {
        if (!date || !emp || !h) { alert('Заполните все поля'); return false; }
        const normalizedDate = normalizeDate(date);
        if (isDuplicate(normalizedDate, emp, null)) { alert('❌ Сотрудник уже добавлен на эту дату'); return false; }
        h = parseFloat(h);
        if (isNaN(h) || h <= 0) { alert('Введите корректное количество часов'); return false; }
        const newRec = { id: generateId(), date: normalizedDate, employee: emp.trim(), hours: h, payment: calcPayment(h) };
        records.push(newRec);
        saveData();
        updateFilters();
        updateAll();
        return true;
    }
    function deleteRec(id) {
        if (confirm('Удалить эту запись?')) {
            records = records.filter(r => r.id !== id);
            saveData();
            updateFilters();
            updateAll();
        }
    }
    function openEdit(id) {
        editingId = id;
        const r = records.find(r => r.id === id);
        document.getElementById('editDate').value = r.date;
        document.getElementById('editEmployee').value = r.employee;
        document.getElementById('editHours').value = r.hours;
        document.getElementById('editModal').style.display = 'flex';
        setupAutocomplete('editEmployee','editAutocompleteList','editDuplicateWarning','editDate');
    }
    function closeEdit() { editingId = null; document.getElementById('editModal').style.display = 'none'; }
    function saveEdit() {
        const date = document.getElementById('editDate').value, employee = document.getElementById('editEmployee').value, hours = parseFloat(document.getElementById('editHours').value);
        if (!date || !employee || isNaN(hours) || hours <= 0) { alert('Заполните все поля'); return; }
        const normalizedDate = normalizeDate(date);
        if (isDuplicate(normalizedDate, employee, editingId)) { alert('❌ Сотрудник уже добавлен на эту дату'); return; }
        const idx = records.findIndex(r => r.id === editingId);
        if (idx !== -1) {
            records[idx] = { ...records[idx], date: normalizedDate, employee: employee.trim(), hours, payment: calcPayment(hours) };
            saveData();
            updateFilters();
            updateAll();
        }
        closeEdit();
    }

    // ============================================================
    // ЭКСПОРТ В ФАЙЛ
    // ============================================================
    function exportToFile() {
        if (records.length === 0) {
            alert('Нет данных для экспорта');
            return;
        }
        const dataStr = JSON.stringify(records, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('✅ Данные экспортированы');
    }
    
    // ============================================================
    // ИМПОРТ ИЗ ФАЙЛА
    // ============================================================
    function importFromFile() {
        document.getElementById('importFile').click();
    }
    
    function handleImportFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    records = imported;
                    saveData();
                    updateFilters();
                    updateAll();
                    alert(`✅ Импортировано ${records.length} записей`);
                } else {
                    alert('❌ Неверный формат файла');
                }
            } catch (err) {
                alert('❌ Ошибка при импорте: ' + err.message);
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ============================================================
    // УПРАВЛЕНИЕ ФИЛЬТРАМИ
    // ============================================================
    function applyReportFilters() {
        currentFilter.startDate = document.getElementById('startDate').value;
        currentFilter.endDate = document.getElementById('endDate').value;
        currentFilter.employee = document.getElementById('employeeFilter').value;
        renderReport();
    }
    function applyListFilters() {
        listFilter.year = document.getElementById('yearListFilter').value;
        listFilter.month = document.getElementById('monthListFilter').value;
        listFilter.employee = document.getElementById('employeeListFilter').value;
        listFilter.sortOrder = document.getElementById('sortOrder').value;
        renderTable();
    }
    function toggleSort() {
        listFilter.sortOrder = listFilter.sortOrder === 'desc' ? 'asc' : 'desc';
        document.getElementById('sortOrder').value = listFilter.sortOrder;
        renderTable();
    }
    function toggleExpand() {
        const c = document.getElementById('recordsContent'), i = document.getElementById('expandIcon');
        if (isExpanded) { c.style.display = 'none'; i.innerText = '▼'; } else { c.style.display = 'block'; i.innerText = '▲'; }
        isExpanded = !isExpanded;
    }

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    function init() {
        loadData();
        updateFilters();
        updateAll();
        setupAutocomplete('newEmployee','autocompleteList','duplicateWarning','newDate');
        setupAutocomplete('editEmployee','editAutocompleteList','editDuplicateWarning','editDate');
        
        document.getElementById('calculateBtn').addEventListener('click', applyReportFilters);
        document.getElementById('exportBtn').addEventListener('click', exportToFile);
        document.getElementById('importBtn').addEventListener('click', importFromFile);
        document.getElementById('importFile').addEventListener('change', handleImportFile);
        document.getElementById('applyListFilterBtn').addEventListener('click', applyListFilters);
        document.getElementById('sortOrder').addEventListener('change', applyListFilters);
        document.querySelector('.sort-header')?.addEventListener('click', toggleSort);
        
        document.getElementById('addBtn').addEventListener('click', () => {
            const d = document.getElementById('newDate').value, e = document.getElementById('newEmployee').value, h = document.getElementById('newHours').value;
            if (addRecord(d, e, h)) {
                document.getElementById('newDate').value = '';
                document.getElementById('newEmployee').value = '';
                document.getElementById('newHours').value = '';
                document.getElementById('duplicateWarning').style.display = 'none';
                updateAll();
            }
        });
        document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
        document.getElementById('cancelEditBtn').addEventListener('click', closeEdit);
        document.getElementById('expandHeader').addEventListener('click', toggleExpand);
        document.getElementById('editModal').addEventListener('click', (e) => { if (e.target === document.getElementById('editModal')) closeEdit(); });
        
        applyReportFilters();
        applyListFilters();
    }
    init();
</script>
</body>
</html>
